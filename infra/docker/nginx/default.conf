server {
    listen 80;
    server_name _;
    root /var/www/html/web;
    index index.php index.html;

    client_max_body_size 64m;

    location ^~ /app/uploads/edd/ {
        add_header Cache-Control "private, no-store" always;
        return 403;
    }

    location ^~ /wp-content/uploads/edd/ {
        add_header Cache-Control "private, no-store" always;
        return 403;
    }

    location ^~ /sr-private-objects/ {
        add_header Cache-Control "private, no-store" always;
        return 403;
    }

    location ^~ /private-downloads/ {
        add_header Cache-Control "private, no-store" always;
        return 403;
    }

    location ~ ^/(checkout|account)(/|$) {
        try_files $uri $uri/ @wordpress_no_store;
    }

    location ^~ /wp-json/ {
        try_files $uri $uri/ @wordpress_no_store;
    }

    location ~ ^/(download|download-tokens)(/|$) {
        try_files $uri $uri/ @wordpress_no_store;
    }

    location @wordpress_no_store {
        add_header Cache-Control "private, no-store" always;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_pass php:9000;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ ^/wp/wp-admin/install\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_pass php:9000;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_pass php:9000;
    }

    location ~* \.(?:log|sql|env|ini)$ {
        deny all;
    }
}
