services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "${APP_PORT:-18080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/wp/wp-admin/install.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      SR_E2E_ENABLED: ${SR_E2E_ENABLED:-0}
      SR_E2E_KEY: ${SR_E2E_KEY:-local-e2e-only}
    volumes:
      - ./:/var/www/html
      - composer-cache:/tmp/composer-cache
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null && php-fpm -t >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  cli:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      SR_E2E_ENABLED: ${SR_E2E_ENABLED:-0}
      SR_E2E_KEY: ${SR_E2E_KEY:-local-e2e-only}
    volumes:
      - ./:/var/www/html
      - composer-cache:/tmp/composer-cache
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    profiles:
      - tools

  mariadb:
    image: mariadb:10.11
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-file-per-table=1
    environment:
      MYSQL_DATABASE: ${DB_NAME:-indicator_marketplace}
      MYSQL_USER: ${DB_USER:-indicator}
      MYSQL_PASSWORD: ${DB_PASSWORD:-indicator-local-only}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-local-only}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-local}
    ports:
      - "${MINIO_API_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-07-03T20-17-25Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-local}
      S3_BUCKET: ${S3_BUCKET:-indicator-assets}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"

  mailpit:
    image: axllent/mailpit:v1.21.8
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8025/"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  composer-cache:
  mariadb-data:
  redis-data:
  minio-data:
